<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./index.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zebkit examples</title>
    <link rel="stylesheet" href="./zebkit-vars.css" />
    <link rel="stylesheet" href="./zebkit.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: var(--zbk-font-family-interface, system-ui), sans-serif;
        background: linear-gradient(180deg, #fdfcf9 0%, #f5f0ff 100%);
        color: #2d1f3b;
      }

      main {
        text-align: center;
        max-width: 60ch;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 1.5rem;
        border: 1px solid rgba(99, 77, 122, 0.15);
        box-shadow: 0 20px 50px rgba(79, 56, 109, 0.1);
      }

      a {
        color: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <p>
        Redirecting to the consolidated gallery… If you are not automatically
        redirected, <a href="./index.html">open the component gallery</a>.
      </p>
    </main>
  </body>
</html>
